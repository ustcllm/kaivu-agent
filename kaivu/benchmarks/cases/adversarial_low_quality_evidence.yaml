case_id: adversarial_low_quality_evidence
priority: P0
category: evidence_robustness
split: release
tags:
  - adversarial
  - evidence_map
  - systematic_review
task: Prevent low-quality or biased evidence from being promoted into decision-grade conclusions.
inputs:
  object_types:
    - claim
    - evidence
expected_outputs:
